<!DOCTYPE html>
<html>
<head>
    <title>챗봇</title>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">🤖 꿀사모 고객센터</div>

<div class="chat-container">

<div class="chat-box">
    {% for chat in chat_history %}
        {% if chat.role == "user" %}
            <div class="user-msg">🐝 {{ chat.content }}</div>
        {% else %}
            <div class="bot-msg">🤖 {{ chat.content }}</div>
        {% endif %}
    {% endfor %}
</div>
    <form method="POST" action="/chatbot" class="chat-input">
        <input type="text" name="message" placeholder="메시지 입력..." required>
        <button type="submit">전송</button>
    </form>

<a href="/board">← 게시판으로 돌아가기</a>

</div>

</body>
</html>
